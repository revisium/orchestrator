sonar.projectKey=revisium_agent-orchestrator
sonar.organization=revisium

sonar.sources=src,scripts,docs,bin,control-plane,README.md,AGENTS.md,package.json,tsconfig.json,eslint.config.mjs
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.test.ts,src/e2e/**,pnpm-lock.yaml

sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Daemon / lifecycle / transport GLUE (ADR 0006): these run as detached daemons or CLI subprocesses,
# or are HTTP/stdio transport plumbing — node:test coverage (unit OR e2e) only instruments the test
# process, so it cannot measure them, exactly like bin/** and scripts/**. They are exercised end-to-end
# by the e2e suite + real-app `revo start` verification. The unit-testable logic is extracted and IS
# unit-tested: config.ts (profiles), host-runtime.ts, control-plane/bootstrap.ts, seed-default-playbook.ts.
sonar.coverage.exclusions=docs/**,scripts/**,bin/**,control-plane/**,*.config.*,eslint.config.mjs,src/host/daemon.ts,src/host/ensure-host.ts,src/cli/commands/lifecycle.ts,src/cli/commands/mcp.ts,src/mcp/mcp-http.service.ts

# pnpm install runs allow-listed native build scripts (sharp, bcrypt, prisma,
# embedded-postgres) on purpose — see pnpm-workspace.yaml allowBuilds.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/ci.yml
