}

input GetRunEventsInput {
  after: String
  first: Int! = 50
  runId: ID!
  type: String
}

type InboxConnection {
  edges: [InboxItemModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type InboxItemModel {
  answer: JSON
  context: JSON
  createdAt: DateTime!
  id: ID!
  kind: String!
  options: JSON
  projectId: String
  resolvedAt: DateTime
  resolvedBy: String
  runId: String
