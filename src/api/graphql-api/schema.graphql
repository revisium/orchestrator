  inputTokens: Int!
  modelProfile: String!
  outputTokens: Int!
  recordedAt: DateTime!
  runId: ID!
  stepId: String!
}

type RunDigestModel {
  latestEvents: [RunEventModel!]!
  pendingInbox: [InboxItemModel!]!
  run: RunModel!
