  signaled: Boolean!
  topic: String
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON @specifiedBy(url: "http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf")

input ListInboxInput {
  after: String
  first: Int! = 50
  runId: String
  status: String
}

input ListMethodInput {
  after: String
  first: Int! = 50
}

input ListRunsInput {
  after: String
  first: Int! = 50
  status: String
}

type Mutation {
  answerQuestion(data: AnswerQuestionInput!): InboxResolutionModel!
  approveGate(data: GateDecisionInput!): InboxResolutionModel!
  createRun(data: CreateRunInput!): CreateRunResultModel!
  rejectGate(data: GateDecisionInput!): InboxResolutionModel!
  resolveInboxItem(data: ResolveInboxItemInput!): InboxResolutionModel!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type PipelineConnection {
  edges: [PipelineModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PipelineModel {
  alternativeRoles: [AlternativeRoleGroupModel!]!
  executionPolicy: JSON
  id: ID!
  optionalRoles: [String!]!
  path: String!
  pipelineId: String!
  playbookId: String!
  requiredRoles: [String!]!
  routeGates: [String!]!
  triggers: [String!]!
}

type PipelineModelEdge {
  cursor: String!
  node: PipelineModel!
}

type PlaybookConnection {
  edges: [PlaybookModelEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PlaybookModel {
  id: ID!
  name: String!
  packageName: String!
  schemaVersion: Int!
  source: String!
  version: String!
}

type PlaybookModelEdge {
  cursor: String!
  node: PlaybookModel!
}

input PrReadinessInput {
  baseBranch: String
  headBranch: String
  includeComments: Boolean
  includeReviewThreads: Boolean
  prNumber: Int
  repo: String!
  sonarProject: String
}

type ProjectModel {
  branch: String!
  dataDir: String!
  org: String!
  project: String!
}

type Query {
  doctor: DoctorResultModel!
  gateRisk(id: ID!): GateRiskModel!
  inbox(data: ListInboxInput): InboxConnection!
  inboxItem(id: ID!): InboxItemModel!
  pendingDecisions(runId: String): [InboxItemModel!]!
  pipeline(id: ID!): PipelineModel!
  pipelines(data: ListMethodInput): PipelineConnection!
  playbooks(data: ListMethodInput): PlaybookConnection!
  prFeedback(data: PrReadinessInput!): JSON!
  prReadiness(data: PrReadinessInput!): JSON!
  project: ProjectModel!
  repositoryContext(repo: String!): RepositoryContextModel!
  role(id: ID!): RoleModel!
  roles(data: ListMethodInput): RoleConnection!
  run(id: ID!): RunModel!
  runDigest(id: ID!): RunDigestModel!
  runEvents(data: GetRunEventsInput!): RunEventConnection!
  runProgress(id: ID!): RunProgressModel!
  runs(data: ListRunsInput): RunConnection!
  simulateRoute(data: SimulateRouteInput!): JSON!
  status: SystemStatusModel!
  validateRepository(repo: String!): RepositoryValidationModel!
}

type RepositoryContextModel {
  branch: String!
  clean: Boolean!
  error: String!
  exists: Boolean!
  files: [RepositoryGuidanceFileModel!]!
  gitRoot: String!
  input: String!
  isDirectory: Boolean!
  packageError: String!
  packageName: String!
  path: String!
  remote: String!
  scripts: [RepositoryScriptModel!]!
}

type RepositoryGuidanceFileModel {
  exists: Boolean!
  path: String!
}

type RepositoryScriptModel {
  command: String!
  name: String!
}

type RepositoryValidationModel {
  branch: String!
  clean: Boolean!
  error: String!
  exists: Boolean!
  gitRoot: String!
  input: String!
  isDirectory: Boolean!
  path: String!
  remote: String!
}

