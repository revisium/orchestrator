name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'pnpm' # caches the pnpm store (~/.pnpm-store), keyed by pnpm-lock.yaml

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify (typecheck + lint + unit coverage)
        run: pnpm run verify

  e2e:
    name: E2E (real DBOS/Revisium + embedded Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # The e2e test installs a playbook from REVO_PLAYBOOK_SOURCE (defaults to ../agent-playbook).
      # revisium/agent-playbook is PUBLIC, so the default GITHUB_TOKEN can read it.
      - name: Checkout agent-playbook (e2e playbook source)
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          repository: revisium/agent-playbook
          ref: master
          path: .agent-playbook

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'pnpm' # caches the pnpm store — incl. the ~200 MB embedded-postgres binary packages

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      # NOT --ignore-scripts: pnpm-workspace.yaml `allowBuilds` permits @embedded-postgres/linux-x64,
      # whose postinstall hydrates the bundled PostgreSQL binary (relative symlinks → cache-safe).
      # No external Postgres service is needed: the Revisium standalone owns an embedded Postgres,
      # and host bootstrap waits for it (ensureRevisium → waitHealthy, ensurePostgres creates `dbos`).
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: corepack enable && pnpm install --frozen-lockfile

      # Cold-start the standalone daemon (initializes embedded Postgres) and bootstrap the
      # control-plane project/schema/seed (admin/control-plane/master). Without bootstrap the
      # run fails with "Project not found". `bootstrap` requires a running daemon and does not
      # start one itself, so the two steps are ordered. Mirrors docs/getting-started.md.
      - name: Start Revisium standalone (embedded Postgres)
        run: pnpm exec tsx src/cli/index.ts revisium start

      - name: Bootstrap control-plane (project + schema + seed)
        run: pnpm exec tsx src/cli/index.ts bootstrap --commit

      - name: Run E2E (REVO_E2E_REAL=1)
        env:
          REVO_PLAYBOOK_SOURCE: ${{ github.workspace }}/.agent-playbook
        run: pnpm run test:e2e

  checks:
    name: Required checks
    runs-on: ubuntu-latest
    permissions: {}
    needs: [verify, e2e]
    if: always()

    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] \
            || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
