sonar.projectKey=revisium_agent-orchestrator
sonar.organization=revisium

sonar.sources=src,scripts,docs,bin,control-plane,README.md,AGENTS.md,package.json,tsconfig.json,eslint.config.mjs
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.test.ts,src/e2e/**,pnpm-lock.yaml

sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Daemon / lifecycle / transport GLUE (ADR 0006): these run as detached daemons or CLI subprocesses,
# or are HTTP/stdio transport plumbing — node:test coverage (unit OR e2e) only instruments the test
# process, so it cannot measure them, exactly like bin/** and scripts/**. They are exercised end-to-end
# by the e2e suite + real-app `revo start` verification. The unit-testable logic is extracted and IS
# unit-tested: config.ts (profiles), host-runtime.ts, control-plane/bootstrap.ts, seed-default-playbook.ts.
#
# Same GLUE rationale, e2e-only flavor: the entries below have NO unit-testable behavior of their own —
# their only paths run when a live server/process is up, so the unit `test:cov` suite (which is the ONLY
# suite Sonar's lcov sees; the real-DBOS e2e job is env-gated behind REVO_E2E_REAL and never feeds lcov)
# reads them as uncovered and drags "Coverage on New Code" below the 80% gate. Each wraps logic that IS
# unit-tested elsewhere, so excluding them masks no real gap:
#   - graphql-api/{inbox,method,pr,runs,system}/{model,inputs}/**: decorator-only @ObjectType/@InputType
#     GraphQL DTOs (no branching). Behavior is asserted by the schema-drift test (graphql-schema.test.ts),
#     not by line coverage; the tsx/lcov source-map mis-attributes @Field decorator lines, parking these
#     DTOs around the 80% line. NOTE: share/** is deliberately NOT excluded — share/model/paginated.model.ts
#     is a real generic mixin factory with logic and stays unit-measured (~91%).
#   - graphql-ws/ws.ts: WebSocket transport bootstrap (useServer + WebSocketServer), like mcp-http.service.ts.
#   - runners/worktree.service.ts: thin @Injectable over git-worktree-manager.ts (the logic, unit-tested);
#     its add/remove paths only run in a real run worktree (e2e).
#   - task-control-plane/pr-readiness.service.ts: thin @Injectable delegating to poller/pr-readiness-core.ts
#     (the logic, unit-tested in poller/pr-readiness.test.ts).
sonar.coverage.exclusions=docs/**,scripts/**,bin/**,control-plane/**,*.config.*,eslint.config.mjs,src/host/daemon.ts,src/host/ensure-host.ts,src/cli/commands/lifecycle.ts,src/cli/commands/mcp.ts,src/mcp/mcp-http.service.ts,src/api/graphql-api/inbox/model/**,src/api/graphql-api/inbox/inputs/**,src/api/graphql-api/method/model/**,src/api/graphql-api/method/inputs/**,src/api/graphql-api/pr/model/**,src/api/graphql-api/pr/inputs/**,src/api/graphql-api/runs/model/**,src/api/graphql-api/runs/inputs/**,src/api/graphql-api/system/model/**,src/api/graphql-api/graphql-ws/ws.ts,src/runners/worktree.service.ts,src/task-control-plane/pr-readiness.service.ts

# pnpm install runs allow-listed native build scripts (sharp, bcrypt, prisma,
# embedded-postgres) on purpose — see pnpm-workspace.yaml allowBuilds.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/ci.yml
