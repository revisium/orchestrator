input RunSubscriptionInput {
  runId: ID
}

input SimulateRouteInput {
  params: JSON
  pipeline: String
  playbookId: String
  repo: String
  title: String!
}

type Subscription {
  inboxItemAdded(data: RunSubscriptionInput): InboxItemModel!
  inboxItemResolved(data: RunSubscriptionInput): InboxItemModel!
  runCostRecorded(data: RunSubscriptionInput): RunCostModel!
  runEventAppended(data: RunSubscriptionInput): RunEventModel!
  runProgressUpdated(data: RunSubscriptionInput): RunProgressModel!
  runUpdated(data: RunSubscriptionInput): RunModel!
}

type SystemStatusModel {
  daemon: DaemonStatusModel!
