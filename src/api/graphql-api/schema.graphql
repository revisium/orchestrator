  priority: Int!
  progress: RunProgressModel!
  repos: [String!]!
  scope: String
  status: String!
  title: String!
}

type RunModelEdge {
  cursor: String!
  node: RunModel!
}

type RunProgressModel {
  graphCursor: JSON
  updatedAt: DateTime!
