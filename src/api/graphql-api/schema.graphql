input AnswerQuestionInput {
  answer: JSON!
  inboxId: ID!
  resolvedBy: String
}

input CreateRunInput {
  description: String
  params: JSON
  pipelineId: String
  playbookId: String
  priority: Int
  repo: String!
  scope: String
  start: Boolean! = false
  title: String!
}

type CreateRunResultModel {
  eventId: ID!
  route: JSON
  runId: ID!
  started: Boolean!
  status: String!
  taskId: ID!
  workflow: JSON
}

type DaemonStatusModel {
  baseUrl: String
  healthy: Boolean!
  httpPort: Int
  pgPort: Int
  pid: Int
  running: Boolean!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

type DoctorResultModel {
  issues: [String!]!
  ok: Boolean!
