name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'pnpm' # caches the pnpm store (~/.pnpm-store), keyed by pnpm-lock.yaml

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify (typecheck + lint + unit coverage)
        run: pnpm run verify

      # `pnpm run verify` ends with `test:cov`, which writes coverage/lcov.info — hand it to the sonar job.
      - name: Upload coverage (lcov) for Sonar
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

  e2e:
    name: E2E (real DBOS/Revisium + embedded Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      # No external playbook checkout: the e2e installs the self-contained fixture committed under
      # src/e2e/fixtures/playbook (PLAYBOOK_SOURCE default), so the suite is independent + stable.
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'pnpm' # caches the pnpm store — incl. the ~200 MB embedded-postgres binary packages

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      # NOT --ignore-scripts: pnpm-workspace.yaml `allowBuilds` permits @embedded-postgres/linux-x64,
      # whose postinstall hydrates the bundled PostgreSQL binary (relative symlinks → cache-safe).
      # No external Postgres service is needed: the Revisium standalone owns an embedded Postgres,
      # and host bootstrap waits for it (ensureRevisium → waitHealthy, ensurePostgres creates `dbos`).
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: corepack enable && pnpm install --frozen-lockfile

      # `test:e2e` is self-contained: scripts/e2e-setup.ts cold-starts an ISOLATED test daemon
      # (REVO_DATA_DIR/REVO_PORT/REVO_PG_PORT → its own embedded Postgres + DBOS db, set in the npm
      # script), bootstraps the control-plane, and installs the playbook — then the test files run.
      # No separate start/bootstrap steps, and no collision with a developer's dogfooding daemon.
      # File concurrency 2 on CI: the hosted runner's 4 shared vCPUs are saturated by the embedded
      # Postgres + daemon already, so 4-way file parallelism runs SLOWER there than 2-way (measured
      # on #260: 4-way 168s vs serial 146s). Local machines keep the default 4 from the npm script.
      - name: Run E2E (REVO_E2E_REAL=1)
        run: pnpm run test:e2e
        env:
          REVO_E2E_FILE_CONCURRENCY: 2

  # SonarCloud analysis. Automatic Analysis is DISABLED in the SonarCloud project, so this CI scan is the
  # sole analysis path (it uploads the lcov from `verify`). Non-required (not in `checks`): the SonarCloud
  # quality-gate is reported on the PR by SonarCloud itself; a scan hiccup must not block merge.
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0 # Sonar needs full history for new-code detection / blame
          persist-credentials: false

      - name: Download coverage (lcov)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true # scan still runs (without coverage) if verify failed before test:cov
        with:
          name: coverage-lcov
          path: coverage

      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checks:
    name: Required checks
    runs-on: ubuntu-latest
    permissions: {}
    needs: [verify, e2e]
    if: always()

    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] \
            || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
